<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1a1410" />
    <title>503 Service Unavailable · Pyra Client</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%239966cc'/%3E%3Cpath d='M50 20 L70 40 L70 60 L50 80 L30 60 L30 40 L50 20Z' fill='%23d4b8ff' stroke='%23fff' stroke-width='4'/%3E%3C/svg%3E" />
    <style>
        body {
            margin: 0;
            background: #1a1410;
            color: #f0ece8;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            background-image: url('https://i.imgur.com/wCzYG3K.png');
            background-size: cover;
            background-blend-mode: overlay;
            background-color: rgba(26, 20, 16, 0.88);
        }
        .error-container {
            max-width: 500px;
            padding: 24px;
        }
        .error-code {
            font-family: 'Courier New', monospace;
            font-size: clamp(72px, 20vw, 140px);
            font-weight: bold;
            color: #9966cc;
            text-shadow: 0 0 30px #9966cc66;
            line-height: 1;
            margin-bottom: 10px;
        }
        .error-text {
            font-family: 'Courier New', monospace;
            font-size: 24px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #d4b8ff;
            margin-bottom: 20px;
        }
        .error-message {
            color: #b0a090;
            font-size: 16px;
            margin-bottom: 32px;
            line-height: 1.5;
        }
        .refresh-btn {
            display: inline-block;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            font-size: 18px;
            letter-spacing: 0.08em;
            padding: 14px 40px;
            background: #9966cc;
            color: #fff;
            border: 2px solid #d4b8ff;
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
            transition: box-shadow 0.28s, transform 0.2s;
            box-shadow: 0 0 22px #9966cc44;
        }
        .refresh-btn:hover {
            box-shadow: 0 0 44px #9966cc88;
            transform: scale(1.04);
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code">503</div>
        <div class="error-text">Service Unavailable</div>
        <p class="error-message">
            Nasz serwer jest chwilowo niedostępny.<br />
            Spróbuj ponownie za kilka minut.
        </p>
        <a href="index.html" class="refresh-btn">🔄 Odśwież</a>
    </div>
</body>
</html>
